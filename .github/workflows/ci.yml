name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=xml
        env:
          OPENAI_API_KEY: sk-test-dummy
          SECRET_KEY: test-secret-key-32-characters-long
          DATABASE_URL: sqlite+aiosqlite:///./test.db
      # Deterministic-engine accuracy floor. Runs fully offline (no API keys).
      # The floor sits just under the current measured F1 so accuracy can only
      # ratchet UP from here; raise it as eval-case false positives are
      # triaged, toward PILOT_TARGETS (precision 0.90 / recall 0.85) in
      # app/config/pilot.py. Before this gate existed, the eval was failing
      # its own targets (F1 ~0.70) and nothing noticed.
      - name: Deterministic-engine accuracy floor
        run: python -m scripts.eval.run_eval --min-f1 0.65

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
