# Render blueprint — `render.yaml`
# Push this to GitHub and click "New Blueprint" in Render to provision the backend
# from the same screen. Secrets are NOT included; set them in the Render dashboard
# under Environment.

services:
  - type: web
    name: up2code-backend
    env: docker
    plan: standard           # 2GB RAM / 1 CPU. The plan-checking pipeline
                             # (PDF render + vision + 10 LLM contexts + code
                             # corpus) OOM-kills a 512MB "starter" on large
                             # plan sets, which returns 503s and trips the
                             # /health check. Drop back to "starter" only if
                             # you cap upload size and page count.
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: REQUIRE_AUTH
        value: "true"
      - key: MAX_UPLOAD_SIZE_MB
        value: "100"
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-7
      - key: ANTHROPIC_MODEL_CHEAP
        value: claude-sonnet-4-6
      - key: ANTHROPIC_MAX_TOKENS
        value: "4096"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PROFESSIONAL
        sync: false
      - key: STRIPE_PRICE_UNLIMITED
        sync: false
      - key: STRIPE_PRICE_PACK_1
        sync: false
      - key: STRIPE_PRICE_PACK_5
        sync: false
      - key: STRIPE_PRICE_PACK_25
        sync: false
      - key: STRIPE_PRICE_PACK_100
        sync: false
      - key: FRONTEND_URL
        sync: false        # set to your Vercel URL after frontend deploys
      - key: SENTRY_DSN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SUPPORT_EMAIL
        value: esmith.marc@gmail.com
      # AWS Textract — leave AWS_TEXTRACT_ENABLED=false until the IAM keys
      # are pasted in below and the service is redeployed.
      - key: AWS_TEXTRACT_ENABLED
        value: "false"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-west-2
