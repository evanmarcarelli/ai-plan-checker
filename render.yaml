# Render blueprint — `render.yaml`
# Push this to GitHub and click "New Blueprint" in Render to provision the backend
# from the same screen. Secrets are NOT included; set them in the Render dashboard
# under Environment.

services:
  - type: web
    name: up2code-backend
    env: docker
    plan: standard           # 2GB. By default (RUN_WORKER_IN_WEB=true) this one
                             # service both serves the API AND runs the job-queue
                             # worker loop in-process, so it needs room for the
                             # pipeline (PDF render + vision + 10 LLM contexts +
                             # code corpus). To split the worker onto the
                             # dedicated `up2code-worker` service below, set
                             # RUN_WORKER_IN_WEB=false here — then this can drop
                             # to "starter" (it would only enqueue).
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: REQUIRE_AUTH
        value: "true"
      # Run the worker loop inside this web service (single-service deploy).
      # Flip to "false" only if you provision the up2code-worker service below.
      - key: RUN_WORKER_IN_WEB
        value: "true"
      - key: MAX_UPLOAD_SIZE_MB
        value: "100"
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-7
      - key: ANTHROPIC_MODEL_CHEAP
        value: claude-sonnet-4-6
      # AI assistant chat (web service only — the worker doesn't serve chat).
      # Cheapest tier: ~3x cheaper than Sonnet. Matches the settings.py default;
      # set here so prod config is explicit rather than relying on the default.
      - key: ANTHROPIC_MODEL_CHAT
        value: claude-haiku-4-5
      - key: ANTHROPIC_MAX_TOKENS
        value: "4096"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PROFESSIONAL
        sync: false
      - key: STRIPE_PRICE_UNLIMITED
        sync: false
      - key: STRIPE_PRICE_PACK_1
        sync: false
      - key: STRIPE_PRICE_PACK_5
        sync: false
      - key: STRIPE_PRICE_PACK_25
        sync: false
      - key: STRIPE_PRICE_PACK_100
        sync: false
      - key: FRONTEND_URL
        sync: false        # set to your Vercel URL after frontend deploys
      - key: SENTRY_DSN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SUPPORT_EMAIL
        value: esmith.marc@gmail.com
      # AWS Textract — leave AWS_TEXTRACT_ENABLED=false until the IAM keys
      # are pasted in below and the service is redeployed.
      - key: AWS_TEXTRACT_ENABLED
        value: "false"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-west-2

  # ──────────────────────────────────────────────────────────────────────
  # OPTIONAL dedicated worker — for horizontal scale only.
  #
  # NOT required for normal operation: by default the web service runs the
  # worker loop in-process (RUN_WORKER_IN_WEB=true), so jobs already process
  # on a single service. Provision THIS service only when one process can't
  # keep up — then set RUN_WORKER_IN_WEB=false on the web service so you don't
  # run two worker pools (harmless if you don't — SKIP LOCKED prevents double-
  # claim — but you'd pay for both).
  #
  # Scale throughput by raising `numInstances`. A `worker` service has no
  # inbound port and no health check. Its env vars duplicate the web service's
  # (Render has no per-blueprint shared group) PLUS the WORKER_* tunables —
  # keep them in sync with the web service above.
  # ──────────────────────────────────────────────────────────────────────
  - type: worker
    name: up2code-worker
    env: docker
    plan: standard
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m app.worker
    autoDeploy: true
    envVars:
      # --- worker tunables (see app/worker.py) ---
      - key: WORKER_LEASE_SEC
        value: "180"
      - key: WORKER_IDLE_SLEEP_SEC
        value: "2"
      - key: WORKER_REAP_EVERY_SEC
        value: "60"
      # --- copied from the web service (keep in sync) ---
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: REQUIRE_AUTH
        value: "true"
      - key: MAX_UPLOAD_SIZE_MB
        value: "100"
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-7
      - key: ANTHROPIC_MODEL_CHEAP
        value: claude-sonnet-4-6
      - key: ANTHROPIC_MAX_TOKENS
        value: "4096"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SUPPORT_EMAIL
        value: esmith.marc@gmail.com
      - key: AWS_TEXTRACT_ENABLED
        value: "false"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-west-2
