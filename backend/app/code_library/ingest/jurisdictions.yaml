# Target list for the ingest pipeline.
#
# `source_id` is the source-specific identifier (e.g. amlegal's `pasadena_ca`,
# municode's `losangeles`, qcode's `hermosabeach`).
# `jurisdictions` is the list of corpus-side scope strings — same values
# the BM25 retriever filters on. Use "CA" for state-wide, "CA:<city>" for
# city, "CA:<county>" for county, "*" for federal.
#
# ─────────────────────────────────────────────────────────────────────────
# LA County coverage
# ─────────────────────────────────────────────────────────────────────────
# Goal: every one of the 88 incorporated cities in LA County + LA County
# unincorporated. Cities are organized by publisher because the ingester
# is publisher-specific. A note on terminology:
#
#   "Neighborhoods of Los Angeles" (Hollywood, Venice, Silver Lake, Echo
#   Park, Studio City, etc.) are NOT separate jurisdictions. They sit
#   inside the City of Los Angeles and are governed by LAMC + LADBS
#   bulletins. We capture that one code book under municode/losangeles
#   below; the neighborhoods do not need separate entries.
#
# Slug verification:
#   Many slugs below are best-effort and marked with `# verify` until a
#   live run confirms the URL pattern. The runbook step is:
#     1. Paste the slug into the publisher's search UI.
#     2. Confirm the URL the site redirects to.
#     3. Drop the `# verify` once confirmed.

