  - source_id: sanfrancisco_ca
    code_name: "San Francisco Municipal Code"
    code_short: SFMC
    version: "2024"
    jurisdictions: ["CA:San Francisco"]
    output_filename: municode_sanfrancisco_ca.jsonl
