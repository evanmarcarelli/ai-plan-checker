  # ---------------------------------------------------------------
  - id: ca_santa_monica
    level: city
    inherits: ca_state
    names: ["Santa Monica", "City of Santa Monica"]
    geo: { state_code: CA, county: "Los Angeles", city: "Santa Monica" }
    authority: "City of Santa Monica — Building & Safety Division"          # [verify]
    # NOTE: Santa Monica's LUP is certified but the LCP is NOT fully
    # certified — the Coastal Commission still issues CDPs there. That
    # flips the permit path vs the beach cities below.            [verify]
    local_amendments:
      building: "Santa Monica Municipal Code Art. 8 — building regulations + seismic retrofit program"  # [verify]
      coastal:  "LUP certified; CDPs issued by the Coastal Commission (no certified LIP)"  # [verify]
    overlays: [coastal, fema_flood, liquefaction]
    corpus_layer_keys: ["*", "CA", "CA:Santa Monica"]

