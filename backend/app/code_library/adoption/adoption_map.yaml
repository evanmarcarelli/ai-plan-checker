# =====================================================================
# Code adoption map — "jurisdiction -> adopted edition + amendment set".
#
# This is the UpCodes-style layer the engine was missing: it answers
# "for THIS jurisdiction, which code editions and local amendments apply,
# and which corpus layers should we search?".
#
# Resolution precedence (most -> least specific): city -> county -> state.
# A record's `inherits` points at the parent whose `adopts` block fills in
# any discipline the child doesn't override.
#
# Edition confidence:
#   [confirmed]  verified against BSC / ICC / LADBS / city-clerk sources 2026-06
#   [verify]     plausible but confirm exact article/year before relying on it
#
# Legal basis: enacted law is not copyrightable (Veeck v. SBCCI; Georgia v.
# Public.Resource.Org). State/local amendments + LADBS bulletins are public
# records. The ICC model base text is the only buy-license layer.
# =====================================================================

records:
  # ---------------------------------------------------------------
  # California state base — inherited by every CA jurisdiction
  # ---------------------------------------------------------------
  - id: ca_state
    level: state
    names: ["California", "CA"]
    geo:
      state_code: CA
    authority: "California Building Standards Commission (BSC)"
    edition_cycle: "2025 Title 24"          # [confirmed] effective 2026-01-01
    prior_edition: "2022 Title 24"          # permits filed before 2026-01-01
    prior_effective_until: "2025-12-31"
    adopts:
      building:      { code: CBC,        part: "T24 Pt 2",    edition: "2025", base_model: "2024 IBC" }   # [confirmed]
      residential:   { code: CRC,        part: "T24 Pt 2.5",  edition: "2025", base_model: "2024 IRC" }   # [confirmed]
      electrical:    { code: CEC,        part: "T24 Pt 3",    edition: "2025", base_model: "2023 NEC" }   # [confirmed]
      mechanical:    { code: CMC,        part: "T24 Pt 4",    edition: "2025", base_model: "2024 UMC" }   # [verify] UMC year
      plumbing:      { code: CPC,        part: "T24 Pt 5",    edition: "2025", base_model: "2024 UPC" }   # [verify] UPC year
      energy:        { code: "Energy Code", part: "T24 Pt 6", edition: "2025", corpus_short: "T24-P6" }   # [confirmed] ingested: corpus/ca_energy_code_2025.jsonl (CEC-400-2025-010-F)
      existing:      { code: CEBC,       part: "T24 Pt 10",   edition: "2025", base_model: "2024 IEBC", corpus_short: "CEBC" }   # [confirmed] ingested: corpus/ca_cebc_2025.jsonl (incl. Jan 2026 erratum); licensed
      fire:          { code: CFC,        part: "T24 Pt 9",    edition: "2025", base_model: "2024 IFC" }   # [verify]
      green:         { code: CALGreen,   part: "T24 Pt 11",   edition: "2025" }
      accessibility: { code: "CBC Ch 11A/11B", part: "T24 Pt 2", edition: "2025" }
    overlays: [very_high_fhsz, fema_flood]
    corpus_layer_keys: ["*", "CA"]
    sources:
      - { layer: state_model, kind: ca_title24_bsc, url: "https://www.dgs.ca.gov/bsc/codes", access: public_index }
      - { layer: state_model, kind: ca_title24_icc_viewer, url: "https://codes.iccsafe.org/codes/california", access: buy_license }

  # ---------------------------------------------------------------
  # City of Los Angeles — PRIMARY record (customer concentration)
  # ---------------------------------------------------------------
  - id: ca_los_angeles_city
    level: city
    inherits: ca_state
    names: ["Los Angeles", "City of Los Angeles", "LA", "L.A."]
    geo:
      state_code: CA
      county: "Los Angeles"
      city: "Los Angeles"
      place_fips: "0644000"
    authority: "Los Angeles Department of Building & Safety (LADBS)"
    # LA edits ON TOP of the CA codes, codified in the LA Municipal Code.
    # LABC = LAMC Ch. IX Art. 1 (sections prefixed "91.") [confirmed]
    # LARC = LAMC Ch. IX Art. 1.5 [confirmed]
    local_amendments:
      building:    "LABC — LAMC Ch. IX, Art. 1"        # [confirmed]
      residential: "LARC — LAMC Ch. IX, Art. 1.5"      # [confirmed]
      electrical:  "LAEC — LAMC Ch. IX, Art. 3"        # [verify] article
      mechanical:  "LA Mechanical — LAMC Ch. IX, Art. 5" # [verify]
      plumbing:    "LAPC — LAMC Ch. IX, Art. 4"        # [verify]
      fire:        "LAFC — LAMC Ch. V, Art. 7"         # [verify]
      green:       "LA Green Building Code — LAMC Ch. IX, Art. 9" # [verify]
      zoning:      "LAMC Chapter I (Planning & Zoning)"
    overlays: [very_high_fhsz, hillside, hpoz, methane_zone, liquefaction, coastal, fema_flood]
    corpus_layer_keys: ["*", "CA", "CA:Los Angeles"]
    sources:
      - { layer: interpretation, kind: ladbs_information_bulletins,
          url: "https://dbs.lacity.gov/forms-publications/publications/information-bulletins-guidelines",
          access: public_pdf }
      - { layer: corrections, kind: ladbs_standard_corrections,
          url: "https://dbs.lacity.gov/forms-and-publications/publications",
          access: public_pdf }
      - { layer: local_amend, kind: lamc_amendment_ordinances,
          url: "https://dbs.lacity.gov/los-angeles-city-code-documents",
          access: public_pdf }
      - { layer: local_amend, kind: amlegal_lamc, slug: los_angeles_ca,
          url: "https://codelibrary.amlegal.com/codes/los_angeles/latest/lamc",
          access: cloudflare_blocked }
      - { layer: state_model, kind: ca_title24_cbc_2025,
          url: "https://codes.iccsafe.org/content/CABC2025P1",
          access: buy_license }
      - { layer: base_model, kind: icc_2024_ibc, access: buy_license }

  # ---------------------------------------------------------------
  # City of Malibu — entire city inside the Coastal Zone
  # ---------------------------------------------------------------
  - id: ca_malibu_city
    level: city
    inherits: ca_state
    names: ["Malibu", "City of Malibu"]
    geo:
      state_code: CA
      county: "Los Angeles"
      city: "Malibu"
      place_fips: "0645246"
    authority: "City of Malibu — Community Development Dept., Building Safety Division"
    # Malibu adopts the LA COUNTY versions of the state codes by reference
    # (MMC Title 15), then layers city amendments on top. Ord. 531
    # (adopted 2026-01-12) brought in the 2025 code cycle.   [confirmed]
    # The whole city sits inside the Coastal Zone under a certified LCP
    # (Coastal Commission, 2002-09-13): every project also needs LCP/CDP
    # review against the Local Implementation Plan.           [confirmed]
    local_amendments:
      building:    "MMC Ch. 15.04 — adopts LA County Code Title 26 (CBC) + city amendments, Ord. 531"  # [confirmed]
      residential: "MMC Title 15 — LA County residential code by reference + city amendments"  # [verify] chapter
      electrical:  "MMC Title 15 — LA County electrical code by reference"   # [verify] chapter
      plumbing:    "MMC Title 15 — LA County plumbing code by reference"     # [verify] chapter
      mechanical:  "MMC Title 15 — LA County mechanical code by reference"   # [verify] chapter
      fire:        "MMC Title 15 — fire code w/ VHFHSZ amendments"           # [verify] chapter
      green:       "MMC Ch. 15.24 — Green Building Standards Code"           # [confirmed]
      zoning:      "Malibu LCP — Land Use Plan + Local Implementation Plan (certified 2002-09-13)"
      coastal:     "Malibu LIP — CDP procedures (Ch. 13), ESHA (Ch. 4), hazards/bluff (Ch. 9-10)"
    overlays: [coastal, very_high_fhsz, fema_flood, liquefaction]
    corpus_layer_keys: ["*", "CA", "CA:Los Angeles County", "CA:Malibu", "CA:Coastal"]
    sources:
      - { layer: local_amend, kind: malibu_lcp_lip,
          url: "https://www.coastal.ca.gov/ventura/malibu-lip-final.pdf",
          access: public_pdf }
      - { layer: local_amend, kind: malibu_lcp_city_page,
          url: "https://www.malibucity.org/372/Local-Coastal-Program",
          access: public_pdf }
      - { layer: local_amend, kind: ecode360_malibu_mmc,
          url: "https://ecode360.com/44335445",
          access: cloudflare_blocked }
      - { layer: state_model, kind: ca_title24_cbc_2025, access: buy_license }

  # ---------------------------------------------------------------
  # Ventura County (unincorporated) — pilot county; coastal segments
  # at La Conchita / Rincon / Solimar and Channel Islands Harbor
  # ---------------------------------------------------------------
  - id: ca_ventura_county
    level: county
    inherits: ca_state
    names: ["Ventura County", "County of Ventura", "unincorporated Ventura"]
    geo:
      state_code: CA
      county: "Ventura"
      city: null
    # Verified from the VCBC 2025 cover page (Ord. 4655): compiled by the
    # Resource Management Agency, Division of Building and Safety.
    authority: "Ventura County Resource Management Agency — Division of Building and Safety"
    local_amendments:
      building: "Ventura County Building Code (VCBC) — Ord. 4655, 2025 ed., eff. 2026-01-01 (ingested: corpus/vcbc_2025_ord4655.jsonl)"
      fire:     "Ventura County Fire Protection District amendments"        # [verify]
      coastal:  "Ventura County certified LCP — Coastal Zoning Ordinance"   # [verify] segments
    overlays: [coastal, very_high_fhsz, fema_flood]
    corpus_layer_keys: ["*", "CA", "CA:Ventura County"]
    sources:
      - { layer: local_amend, kind: ventura_county_building,
          url: "https://vcpublicworks.org/bs/", access: public_index }
      - { layer: local_amend, kind: vcbc_ordinance_pdf,
          note: "Ord. 4655 compiled PDF (county edict) — ingest via: python -m app.code_library.ingest vcbc --pdf <path>",
          access: public_pdf }

  # ---------------------------------------------------------------
  # Ventura County coastal cities (north → south)
  # ---------------------------------------------------------------
