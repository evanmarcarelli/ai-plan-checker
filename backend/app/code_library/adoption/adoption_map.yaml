      coastal:  "Port Hueneme certified LCP"                               # [verify]
    overlays: [coastal, fema_flood]
    corpus_layer_keys: ["*", "CA", "CA:Port Hueneme"]

  # ---------------------------------------------------------------
  # LA County coastal cities (north → south; Malibu has its own
  # record above; LA-city coastal communities ride ca_los_angeles_city
  # + the dynamic CA:Coastal layer; Marina del Rey + Catalina
