    level: city
    inherits: ca_state
    names: ["Ventura", "San Buenaventura", "City of Ventura"]
    geo: { state_code: CA, county: "Ventura", city: "Ventura" }
    authority: "City of Ventura — Community Development Dept., Building & Safety"  # [verify]
    local_amendments:
      building: "Ventura Municipal Code — building code adoption chapter"   # [verify] chapter
      coastal:  "City of Ventura certified LCP (city issues CDPs)"          # [verify] cert year
    overlays: [coastal, very_high_fhsz, fema_flood]
    corpus_layer_keys: ["*", "CA", "CA:Ventura"]

  - id: ca_oxnard
