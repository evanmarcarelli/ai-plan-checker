// ── helpers ────────────────────────────────────────────────────────────────
function scoreColor(s) {
  if (s >= 80) return { bg:'bg-emerald-100', text:'text-emerald-800', bar:'bg-emerald-500' };
  if (s >= 50) return { bg:'bg-amber-100',   text:'text-amber-800',   bar:'bg-amber-400' };
  return { bg:'bg-red-100', text:'text-red-800', bar:'bg-red-500' };
}

function statusBadge(s) {
  const map = {
    'Triaged':   'bg-blue-100 text-blue-800',
    'In Review': 'bg-violet-100 text-violet-800',
    'Pending':   'bg-slate-100 text-slate-600',
  };
  return map[s] || 'bg-slate-100 text-slate-600';
}

function severityBadge(s) {
  const map = {
    'Fail':    'bg-red-100 text-red-800 border border-red-200',
    'Warning': 'bg-amber-100 text-amber-800 border border-amber-200',
    'Info':    'bg-blue-100 text-blue-800 border border-blue-200',
    'Pass':    'bg-emerald-100 text-emerald-800 border border-emerald-200',
  };
  return map[s] || '';
}

function roleBadge(r) {
  const map = {
    'Admin':      'bg-slate-700 text-white',
    'Supervisor': 'bg-violet-100 text-violet-800',
    'Reviewer':   'bg-blue-100 text-blue-800',
    'Intake':     'bg-slate-100 text-slate-700',
  };
  return map[r] || '';
}

// ── Queue view ─────────────────────────────────────────────────────────────
function QueueView({ onSelect }) {
  const [statusFilter, setStatusFilter] = useState('All');
  const [search, setSearch] = useState('');

  const filtered = SUBMITTALS.filter(s => {
    if (statusFilter !== 'All' && s.status !== statusFilter) return false;
    if (search && !s.project.toLowerCase().includes(search.toLowerCase()) && !s.id.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  return (
    <div className="fade-in">
      <div className="flex items-center justify-between mb-5">
        <div>
          <h1 className="text-lg font-semibold text-slate-900">Submittal Queue</h1>
          <p className="text-sm text-slate-500 mt-0.5">{filtered.length} submittals · sorted by completeness score</p>
        </div>
        <button className="bg-blue-600 hover:bg-blue-700 text-white text-sm px-4 py-2 rounded font-medium transition-colors">
          + New Submittal
        </button>
      </div>

      {/* Filter bar */}
      <div className="flex gap-3 mb-4">
        <input
          className="border border-slate-200 rounded px-3 py-1.5 text-sm w-56 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
          placeholder="Search project or ID…"
          value={search}
          onChange={e => setSearch(e.target.value)}
        />
        <div className="flex gap-1 bg-white border border-slate-200 rounded p-1">
          {['All','Triaged','In Review','Pending'].map(s => (
            <button
              key={s}
              onClick={() => setStatusFilter(s)}
              className={`px-3 py-1 rounded text-xs font-medium transition-colors ${statusFilter===s ? 'bg-slate-800 text-white' : 'text-slate-600 hover:bg-slate-100'}`}
            >{s}</button>
          ))}
        </div>
      </div>

      {/* Table */}
      <div className="bg-white rounded-lg border border-slate-200 overflow-hidden shadow-sm">
        <table className="w-full text-sm">
          <thead>
            <tr className="bg-slate-50 border-b border-slate-200">
              <th className="text-left px-4 py-3 font-medium text-slate-600 text-xs uppercase tracking-wide">ID</th>
              <th className="text-left px-4 py-3 font-medium text-slate-600 text-xs uppercase tracking-wide">Project</th>
              <th className="text-left px-4 py-3 font-medium text-slate-600 text-xs uppercase tracking-wide">Occupancy</th>
              <th className="text-left px-4 py-3 font-medium text-slate-600 text-xs uppercase tracking-wide">Submitted</th>
              <th className="text-left px-4 py-3 font-medium text-slate-600 text-xs uppercase tracking-wide">Score</th>
              <th className="text-left px-4 py-3 font-medium text-slate-600 text-xs uppercase tracking-wide">Status</th>
              <th className="text-left px-4 py-3 font-medium text-slate-600 text-xs uppercase tracking-wide">Reviewer</th>
            </tr>
          </thead>
          <tbody className="divide-y divide-slate-100">
            {filtered.map(row => {
              const c = scoreColor(row.score);
              return (
                <tr
                  key={row.id}
                  onClick={() => onSelect(row)}
                  className="hover:bg-blue-50 cursor-pointer transition-colors"
                >
                  <td className="px-4 py-3 font-mono text-xs text-slate-500">{row.id}</td>
                  <td className="px-4 py-3">
                    <div className="font-medium text-slate-900">{row.project}</div>
                    <div className="text-xs text-slate-400 mt-0.5">{row.applicant}</div>
                  </td>
                  <td className="px-4 py-3 text-slate-600">{row.occupancy}</td>
                  <td className="px-4 py-3 text-slate-500 text-xs">{row.submitted}</td>
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-2">
                      <div className="w-16 bg-slate-100 rounded-full h-1.5">
                        <div className={`h-1.5 rounded-full score-bar ${c.bar}`} style={{width:`${row.score}%`}} />
                      </div>
                      <span className={`text-xs font-semibold px-1.5 py-0.5 rounded ${c.bg} ${c.text}`}>{row.score}</span>
                    </div>
                  </td>
                  <td className="px-4 py-3">
                    <span className={`text-xs font-medium px-2 py-1 rounded-full ${statusBadge(row.status)}`}>{row.status}</span>
                  </td>
                  <td className="px-4 py-3 text-slate-600 text-xs">{row.reviewer}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Submittal detail ───────────────────────────────────────────────────────
function DetailView({ submittal, onBack }) {
  const [tab, setTab] = useState('Findings');
  const [draftText, setDraftText] = useState('');
  const [draftRef, setDraftRef] = useState('');
  const [accepted, setAccepted] = useState({});
  const [page, setPage] = useState(1);
  const totalPages = 24;
  const c = scoreColor(submittal.score);

  function handleDraft(f) {
    if (!f.draft) return;
    setDraftText(f.draft);
    setDraftRef(f.ref);
  }

  function handleAccept(id) { setAccepted(a => ({...a, [id]:'accepted'})); setDraftText(''); }
  function handleReject(id) { setAccepted(a => ({...a, [id]:'rejected'})); setDraftText(''); }

  return (
    <div className="fade-in">
      <button onClick={onBack} className="flex items-center gap-1.5 text-sm text-blue-600 hover:text-blue-800 mb-4 transition-colors">
        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
        Back to Queue
      </button>

      {/* Header */}
      <div className="bg-white border border-slate-200 rounded-lg p-5 mb-4 shadow-sm">
        <div className="flex items-start justify-between">
          <div>
            <div className="flex items-center gap-2 mb-1">
              <span className="font-mono text-xs text-slate-400">{submittal.id}</span>
              <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${statusBadge(submittal.status)}`}>{submittal.status}</span>
            </div>
            <h2 className="text-xl font-semibold text-slate-900">{submittal.project}</h2>
            <p className="text-sm text-slate-500 mt-1">{submittal.applicant} · {submittal.occupancy} · submitted {submittal.submitted}</p>
          </div>
          <div className="text-right">
            <div className="text-xs text-slate-500 mb-1">Completeness Score</div>
            <div className={`text-2xl font-bold ${c.text}`}>{submittal.score}<span className="text-base font-normal text-slate-400">/100</span></div>
            <div className="w-32 bg-slate-100 rounded-full h-2 mt-2">
              <div className={`h-2 rounded-full score-bar ${c.bar}`} style={{width:`${submittal.score}%`}} />
            </div>
          </div>
        </div>
      </div>

      {/* Split layout */}
      <div className="flex gap-4">
        {/* PDF pane */}
        <div className="w-80 flex-shrink-0">
          <div className="bg-white border border-slate-200 rounded-lg shadow-sm overflow-hidden">
            <div className="bg-slate-800 text-slate-300 text-xs px-3 py-2 flex items-center justify-between">
              <span>Sheet A2.1 — Floor Plan</span>
              <span className="text-slate-500">{submittal.id}.pdf</span>
            </div>
            {/* Mock PDF */}
            <div className="bg-slate-100 relative" style={{height:360}}>
              <svg viewBox="0 0 280 360" className="w-full h-full opacity-60">
                <rect width="280" height="360" fill="#e2e8f0"/>
                {/* floor plan sketch */}
                <rect x="20" y="20" width="240" height="180" fill="none" stroke="#94a3b8" strokeWidth="2"/>
                <rect x="20" y="20" width="110" height="80" fill="none" stroke="#94a3b8" strokeWidth="1.5"/>
                <rect x="130" y="20" width="130" height="80" fill="none" stroke="#94a3b8" strokeWidth="1.5"/>
                <rect x="20" y="100" width="240" height="100" fill="none" stroke="#94a3b8" strokeWidth="1.5"/>
                <line x1="80" y1="20" x2="80" y2="32" stroke="#ef4444" strokeWidth="2"/>
                <line x1="80" y1="28" x2="96" y2="28" stroke="#ef4444" strokeWidth="2" strokeDasharray="3"/>
                <text x="140" y="75" textAnchor="middle" fontSize="9" fill="#64748b">DINING AREA</text>
                <text x="65" y="55" textAnchor="middle" fontSize="7" fill="#94a3b8">KITCHEN</text>
                <text x="195" y="55" textAnchor="middle" fontSize="7" fill="#94a3b8">BAR</text>
                <text x="140" y="155" textAnchor="middle" fontSize="9" fill="#64748b">MAIN HALL</text>
                <rect x="20" y="200" width="240" height="140" fill="none" stroke="#94a3b8" strokeWidth="2"/>
                <line x1="130" y1="200" x2="130" y2="340" stroke="#94a3b8" strokeWidth="1.5"/>
                <text x="75" y="275" textAnchor="middle" fontSize="8" fill="#94a3b8">OFFICE</text>
                <text x="205" y="275" textAnchor="middle" fontSize="8" fill="#94a3b8">STORAGE</text>
                {/* egress arrow missing */}
                <circle cx="245" cy="35" r="8" fill="#fef2f2" stroke="#ef4444" strokeWidth="1.5"/>
                <text x="245" y="39" textAnchor="middle" fontSize="9" fill="#ef4444" fontWeight="bold">!</text>
                {/* north arrow */}
                <text x="250" y="350" fontSize="7" fill="#94a3b8">N ↑</text>
                <text x="20" y="355" fontSize="6" fill="#94a3b8">SCALE: 1/8" = 1'-0"</text>
              </svg>
              <div className="absolute top-2 right-2 bg-red-500 text-white text-xs rounded px-1.5 py-0.5">Missing egress</div>
            </div>
            {/* Page controls */}
            <div className="flex items-center justify-between px-3 py-2 border-t border-slate-200 bg-slate-50">
              <button onClick={() => setPage(p => Math.max(1,p-1))} disabled={page===1} className="text-slate-500 hover:text-slate-800 disabled:opacity-30 text-xs px-2 py-1 rounded hover:bg-slate-200 transition-colors">← Prev</button>
              <span className="text-xs text-slate-500">Page {page} of {totalPages}</span>
              <button onClick={() => setPage(p => Math.min(totalPages,p+1))} disabled={page===totalPages} className="text-slate-500 hover:text-slate-800 disabled:opacity-30 text-xs px-2 py-1 rounded hover:bg-slate-200 transition-colors">Next →</button>

          </div>
        </div>

        {/* Right pane */}
        <div className="flex-1 min-w-0">

            {['Findings','Comments'].map(t => (
              <button key={t} onClick={() => setTab(t)}

              >{t} {t==='Findings' && <span className={`ml-1 text-xs px-1.5 py-0.5 rounded-full ${tab===t?'bg-slate-600':'bg-slate-100 text-slate-500'}`}>{FINDINGS.length}</span>}</button>
            ))}
          </div>

          {tab === 'Findings' && (
            <div className="space-y-2">
              {FINDINGS.map(f => (
                <div key={f.id} className={`bg-white border rounded-lg p-4 shadow-sm transition-all ${accepted[f.id]==='accepted'?'border-emerald-300 opacity-60':accepted[f.id]==='rejected'?'border-slate-200 opacity-40':'border-slate-200'}`}>
                  <div className="flex items-start justify-between gap-3">
                    <div className="flex items-start gap-3 min-w-0">
                      <span className={`text-xs font-semibold px-2 py-0.5 rounded flex-shrink-0 mt-0.5 ${severityBadge(f.severity)}`}>{f.severity}</span>
                      <div className="min-w-0">
                        <div className="flex items-center gap-2 mb-1">
                          <span className="font-mono text-xs text-blue-700 font-semibold">{f.ref}</span>
                          {accepted[f.id] && <span className={`text-xs ${accepted[f.id]==='accepted'?'text-emerald-600':'text-slate-400'}`}>{accepted[f.id]==='accepted'?'✓ Accepted':'✗ Rejected'}</span>}
                        </div>
                        <p className="text-sm text-slate-700">{f.desc}</p>
                      </div>
                    </div>
                    {f.draft && !accepted[f.id] && (
                      <button
                        onClick={() => handleDraft(f)}
                        className="flex-shrink-0 text-xs bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 px-3 py-1.5 rounded font-medium transition-colors"
                      >Draft Comment</button>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}

          {tab === 'Comments' && (
            <div className="bg-white border border-slate-200 rounded-lg p-4 shadow-sm">
              <p className="text-sm text-slate-500">No comments finalized yet. Accept drafted comments from the Findings tab.</p>
            </div>
          )}

          {/* Comment composer */}
          {draftText && (
            <div className="mt-4 bg-white border border-blue-200 rounded-lg p-4 shadow-sm fade-in">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-xs font-semibold text-blue-700 bg-blue-50 border border-blue-200 px-2 py-0.5 rounded">AI Draft</span>
                <span className="font-mono text-xs text-slate-500">{draftRef}</span>
              </div>
              <textarea
                className="w-full border border-slate-200 rounded p-3 text-sm text-slate-800 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 leading-relaxed"
                rows={5}
                value={draftText}
                onChange={e => setDraftText(e.target.value)}
              />
              <p className="text-xs text-slate-400 mt-1 mb-3">Reviewer is responsible for verifying accuracy before accepting.</p>
              <div className="flex gap-2">
                <button onClick={() => handleAccept(FINDINGS.find(f=>f.ref===draftRef)?.id)} className="bg-emerald-600 hover:bg-emerald-700 text-white text-sm px-4 py-1.5 rounded font-medium transition-colors">Accept</button>
                <button className="bg-white hover:bg-slate-50 text-slate-700 border border-slate-300 text-sm px-4 py-1.5 rounded font-medium transition-colors">Save Edit</button>
                <button onClick={() => { handleReject(FINDINGS.find(f=>f.ref===draftRef)?.id); }} className="text-slate-500 hover:text-slate-700 text-sm px-3 py-1.5 rounded font-medium transition-colors">Reject</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

    { name:'D. Okafor',   count:18, avg:74 },
    { name:'M. Hennessy', count:15, avg:71 },
    { name:'J. Matsuda',  count:14, avg:69 },
  ];
  return (
    <div className="fade-in">
      <h1 className="text-lg font-semibold text-slate-900 mb-5">Analytics</h1>
      <div className="grid grid-cols-4 gap-4 mb-8">
        {stats.map(s => (
          <div key={s.label} className="bg-white border border-slate-200 rounded-lg p-4 shadow-sm">
            <div className="text-2xl font-bold text-slate-900">{s.value}</div>
            <div className="text-sm font-medium text-slate-700 mt-1">{s.label}</div>
            <div className="text-xs text-slate-400 mt-0.5">{s.sub}</div>
          </div>
        ))}
      </div>
      <div className="bg-white border border-slate-200 rounded-lg p-5 shadow-sm">
        <h2 className="text-sm font-semibold text-slate-700 mb-4">Reviewer Activity — May 2024</h2>
        <table className="w-full text-sm">
          <thead><tr className="border-b border-slate-100">
            <th className="text-left pb-2 text-xs text-slate-500 font-medium uppercase tracking-wide">Reviewer</th>
            <th className="text-left pb-2 text-xs text-slate-500 font-medium uppercase tracking-wide">Submittals reviewed</th>
            <th className="text-left pb-2 text-xs text-slate-500 font-medium uppercase tracking-wide">Avg score processed</th>
          </tr></thead>
          <tbody className="divide-y divide-slate-50">
            {reviewers.map(r => (
              <tr key={r.name}>
                <td className="py-2.5 font-medium text-slate-800">{r.name}</td>
                <td className="py-2.5 text-slate-600">{r.count}</td>
                <td className="py-2.5">
                  <div className="flex items-center gap-2">
                    <div className="w-24 bg-slate-100 rounded-full h-1.5">
                      <div className={`h-1.5 rounded-full ${scoreColor(r.avg).bar}`} style={{width:`${r.avg}%`}} />
                    </div>
                    <span className="text-slate-600">{r.avg}</span>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Settings view ──────────────────────────────────────────────────────────
function SettingsView() {
  const [codeYear, setCodeYear] = useState('2021');
  const [rules, setRules] = useState(RULES.reduce((acc,r) => ({...acc,[r.id]:r.enabled}), {}));

  function toggleRule(id) { setRules(r => ({...r,[id]:!r[id]})); }

  return (
    <div className="fade-in max-w-3xl">
      <h1 className="text-lg font-semibold text-slate-900 mb-5">Agency Settings</h1>

      {/* Agency info */}
      <div className="bg-white border border-slate-200 rounded-lg p-5 mb-4 shadow-sm">
        <h2 className="text-sm font-semibold text-slate-700 mb-3">Agency</h2>
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 rounded bg-blue-700 flex items-center justify-center text-white font-bold text-sm">TC</div>
          <div>
            <div className="font-semibold text-slate-900">City of Tacoma — Building Dept</div>
            <div className="text-xs text-slate-400">tacoma.gov · Plan Check Division · Agency ID: agency_tacoma_001</div>
          </div>
        </div>
      </div>

      {/* Code year */}
      <div className="bg-white border border-slate-200 rounded-lg p-5 mb-4 shadow-sm">
        <h2 className="text-sm font-semibold text-slate-700 mb-3">IBC Code Year</h2>
        <div className="flex gap-2">
          {['2018','2021','2024'].map(y => (
            <button
              key={y}
              onClick={() => setCodeYear(y)}
              className={`px-5 py-2 rounded border text-sm font-medium transition-colors ${codeYear===y ? 'border-blue-600 bg-blue-50 text-blue-700' : 'border-slate-200 text-slate-600 hover:bg-slate-50'}`}
            >{y} IBC</button>
          ))}
        </div>
        <p className="text-xs text-slate-400 mt-2">Applies to all triage runs and code citation lookups for this agency.</p>
      </div>

      {/* Custom rules */}
      <div className="bg-white border border-slate-200 rounded-lg p-5 mb-4 shadow-sm">
        <div className="flex items-center justify-between mb-3">
          <h2 className="text-sm font-semibold text-slate-700">Custom Rules & Overrides</h2>
          <button className="text-xs text-blue-600 hover:text-blue-800 font-medium transition-colors">+ Add rule</button>
        </div>
        <div className="space-y-3">
          {RULES.map(r => (
            <div key={r.id} className="flex items-center justify-between py-2 border-b border-slate-50 last:border-0">
              <span className="text-sm text-slate-700 mr-4">{r.label}</span>
              <button
                onClick={() => toggleRule(r.id)}
                className={`relative inline-flex h-5 w-9 flex-shrink-0 rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none ${rules[r.id] ? 'bg-blue-600' : 'bg-slate-200'}`}
              >
                <span className={`pointer-events-none inline-block h-4 w-4 rounded-full bg-white shadow transform transition duration-200 ease-in-out ${rules[r.id] ? 'translate-x-4' : 'translate-x-0'}`} />
              </button>
            </div>
          ))}
        </div>
      </div>

      {/* Members */}
      <div className="bg-white border border-slate-200 rounded-lg p-5 shadow-sm">
        <div className="flex items-center justify-between mb-3">
          <h2 className="text-sm font-semibold text-slate-700">Members</h2>
          <button className="text-xs text-blue-600 hover:text-blue-800 font-medium transition-colors">+ Invite member</button>
        </div>
        <div className="space-y-1">
          {MEMBERS.map(m => (
            <div key={m.email} className={`flex items-center justify-between py-2 ${!m.active ? 'opacity-50' : ''}`}>
              <div className="flex items-center gap-3">
                <div className="w-7 h-7 rounded-full bg-slate-200 flex items-center justify-center text-xs font-semibold text-slate-600">
                  {m.name.split(' ').map(n=>n[0]).join('')}
                </div>
                <div>
                  <div className="text-sm font-medium text-slate-800">{m.name}</div>
                  <div className="text-xs text-slate-400">{m.email}</div>
                </div>
              </div>
              <div className="flex items-center gap-2">
                {!m.active && <span className="text-xs text-slate-400">Inactive</span>}
                <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${roleBadge(m.role)}`}>{m.role}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('Queue');
  const [selected, setSelected] = useState(null);

  function handleSelect(row) { setSelected(row); }
  function handleBack()     { setSelected(null); }

  return (
    <div className="min-h-screen bg-slate-50">
      <Nav view={view} setView={(v) => { setView(v); setSelected(null); }} />
      <main className="max-w-6xl mx-auto px-6 pt-20 pb-10">
        {view === 'Queue'     && !selected && <QueueView onSelect={handleSelect} />}
        {view === 'Queue'     && selected  && <DetailView submittal={selected} onBack={handleBack} />}
        {view === 'Analytics' && <AnalyticsView />}
        {view === 'Settings'  && <SettingsView />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
